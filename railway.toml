[build]
  builder = "nixpacks"

  [build.nixpacks]
    providers = ["node"]

    [build.nixpacks.apt]
      packages = ["python3", "python3-pip", "python3-setuptools"]

    [build.nixpacks.phases.setup]
      nixPackages = ["python3", "python3-pip"]

    [build.nixpacks.phases.install]
      cmds = [
        "npm config set python python3",
        "pip3 install edge-tts"
      ]
